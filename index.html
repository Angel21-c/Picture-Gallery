<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My images</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
  <main>
    <section class="grid-container">
        <div class="grid-boxes"><img src="standalone-img-folder1/img1.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/img2.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/img3.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/img4.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/img5.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/img6.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/img7.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/img8.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/img9.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/img10.jpg" alt="" class="images"></div>  
    </section>

    <section class="modalContainer" id="modalContainer">
       <span class="Close">&times;</span>
       <span class="nextBtn">&#10095</span>
       <span class="previousBtn">&#10094</span>

       <img class="modalImage" alt="" id="modalImage">
    </section>
  </main> 
  
  <script src="index.js"></script>
</body>
</html>
