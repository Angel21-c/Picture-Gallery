<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My images</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
  <main>
    <section class="grid-container">
        <div class="grid-boxes"><img src="standalone-img-folder1/Girl1.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/City2.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/Beach3.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/Boy4.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/Tower5.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/Girl6.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/Office7.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/Room8.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/Hill9.jpg" alt="" class="images"></div>
        <div class="grid-boxes"><img src="standalone-img-folder1/Field10.jpg" alt="" class="images"></div>  
    </section>

    <section class="modalContainer" id="modalContainer">
       <span class="Close">&times;</span>
       <span class="nextBtn">&#10095</span>
       <span class="previousBtn">&#10094</span>

       <img class="modalImage" alt="" id="modalImage">
    </section>
  </main> 
  
  <script src="index.js"></script>
</body>
</html>
